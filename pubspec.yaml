name: daily_life_helper
description: "Daily Life Helper – Health, Period & Medicine Reminder"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  provider: ^6.1.1

  # Local Database
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Notifications
  flutter_local_notifications: ^17.2.4
  timezone: ^0.9.4
  flutter_timezone: ^3.0.1

  # UI Components
  table_calendar: ^3.1.2
  fl_chart: ^0.69.0
  smooth_page_indicator: ^1.2.0+3
  percent_indicator: ^4.2.3
  google_fonts: ^6.2.1

  # Premium UI
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0
  confetti: ^0.7.0
  flutter_staggered_animations: ^1.1.1
  curved_navigation_bar: ^1.0.6
  emoji_picker_flutter: ^2.1.1
  syncfusion_flutter_gauges: ^24.1.41

  # Utilities
  intl: ^0.19.0
  shared_preferences: ^2.3.3
  uuid: ^4.5.1
  permission_handler: ^11.3.1

  # Future: Ads & Analytics
  # google_mobile_ads: ^5.1.0
  # firebase_core: ^3.8.0
  # firebase_analytics: ^11.3.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13

flutter:
  uses-material-design: true

  assets:
    - assets/images/

